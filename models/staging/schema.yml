version: 2

models:

  - name: stg_posts
    description: "Staging de posts desde JSONPlaceholder"
    columns:
      - name: post_id
        description: "ID único del post"
        tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 100

      - name: user_id
        description: "ID del usuario autor del post (puede venir NULL desde la fuente)"
        tests:
          # No usamos not_null porque en tu fuente user_id está viniendo NULL
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id

      - name: title
        description: "Título del post"
        tests:
          - not_null

      - name: loaded_at
        description: "Timestamp de carga"
        tests:
          - not_null


  - name: stg_users
    description: "Staging de usuarios desde JSONPlaceholder"
    columns:
      - name: user_id
        description: "ID único del usuario"
        tests:
          - not_null
          - unique

      - name: email
        description: "Email del usuario"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_not_be_null: {}
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"

      - name: loaded_at
        description: "Timestamp de carga"
        tests:
          - not_null